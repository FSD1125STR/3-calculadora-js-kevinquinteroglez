<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <title>Calculadora Kevin</title>
    <link rel="stylesheet" href="style.css" />
    <script src="script.js" defer></script>
  </head>
  <body>
    <h1>Calculadora de Matemáticas</h1>

    <table id="tablita">
      <tr>
        <td colspan="4">
          <input type="text" id="pantalla" />
        </td>
      </tr>
      <tr>
        <td><button onclick="escribir('7')">7</button></td>
        <td><button onclick="escribir('8')">8</button></td>
        <td><button onclick="escribir('9')">9</button></td>
        <td><button class="operador" onclick="escribir('/')">/</button></td>
      </tr>
      <tr>
        <td><button onclick="escribir('4')">4</button></td>
        <td><button onclick="escribir('5')">5</button></td>
        <td><button onclick="escribir('6')">6</button></td>
        <td><button class="operador" onclick="escribir('*')">*</button></td>
      </tr>
      <tr>
        <td><button onclick="escribir('1')">1</button></td>
        <td><button onclick="escribir('2')">2</button></td>
        <td><button onclick="escribir('3')">3</button></td>
        <td><button class="operador" onclick="escribir('-')">-</button></td>
      </tr>
      <tr>
        <td><button id="btn-borrar" onclick="limpiar()">C</button></td>
        <td><button onclick="escribir('0')">0</button></td>
        <td><button class="operador" onclick="calcular()">=</button></td>
        <td><button class="operador" onclick="escribir('+')">+</button></td>
      </tr>
    </table>
  </body>
</html>
